     name: Cosmic Mood Engine

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-generator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@v4

      - name: Configure Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: pip install requests

      - name: Execute Gemini Content Pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate.py

      - name: Commit and Push Updated Horoscopes
        run: |
          git config --global user.name 'Cosmic Mood Engine Bot'
          git config --global user.email 'bot@cosmicmood.com'
          git add horoscopes.json
          git commit -m "Automated Content Update: New daily horoscopes sync completed" || echo "No data changes detected today."
          git push

